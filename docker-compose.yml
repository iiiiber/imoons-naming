version: '3.8'

# ===============================================
# 起名网 一键启动（开发 + 生产通用）
# ===============================================
# 用法：
#   docker compose up -d        # 后台启动
#   docker compose logs -f       # 看日志
#   docker compose down          # 停止
#
# 访问：http://localhost:8080/app/

services:
  # ===============================================
  # MySQL 8 数据库
  # ===============================================
  mysql:
    image: mysql:8.0
    container_name: naming-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-name_imoons_cn}
      MYSQL_USER: ${MYSQL_USER:-name_imoons_cn}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-namingpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===============================================
  # PHP 8.2 + FPM（业务后端）
  # ===============================================
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: naming-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE:-name_imoons_cn}
      DB_USER: ${MYSQL_USER:-name_imoons_cn}
      DB_PASS: ${MYSQL_PASSWORD:-namingpass}
    volumes:
      - ./backend-php:/var/www/html/api:ro
    networks:
      - backend

  # ===============================================
  # Nginx（反代 + 静态 SPA）
  # ===============================================
  nginx:
    image: nginx:1.24-alpine
    container_name: naming-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/var/www/html/app:ro
    networks:
      - backend

volumes:
  mysql_data:
    driver: local

networks:
  backend:
    driver: bridge
