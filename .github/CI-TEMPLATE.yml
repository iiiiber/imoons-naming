# GitHub Actions CI 模板
#
# ⚠️ 为什么这文件不在 .github/workflows/？
# GitHub Personal Access Token (PAT) 首次推送包含 .github/workflows/*.yml 的
# commit 时，会要求 token 必须有 `workflow` scope。出于安全考虑，我们建议：
#
# ✅ 推荐做法（启用 CI 的两个步骤）：
#   1) 在 GitHub 网页进入 Settings → Secrets and variables → Actions 添加 secrets
#   2) 用 GitHub 网页编辑器（或 gh CLI）创建 .github/workflows/ci.yml
#      （gh CLI 走 OAuth，token 有完整权限，不受 workflow scope 限制）
#
# ✅ 启用步骤：
#   1. 复制下面 `=== BEGIN ===` 到 `=== END ===` 之间的内容
#   2. 保存为 .github/workflows/ci.yml（commit 到 main）
#   3. GitHub Actions 会自动识别并启用
#   4. 之后每次 push 都会自动跑 CI

# === BEGIN ci.yml ===
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: frontend/dist/
          retention-days: 7

  backend-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      - name: Lint PHP
        working-directory: backend-php
        run: |
          find . -name "*.php" -not -path "./vendor/*" | xargs -I {} php -l {}

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build php image
        run: docker build -t imoons-naming:test -f docker/Dockerfile.php .
# === END ci.yml ===
