server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html index.php;

    # 根 URL 跳 SPA
    location = / {
        return 301 /app/;
    }

    # 旧 admin 路径跳新后台
    location = /admin.html {
        return 301 /app/admin/login;
    }

    # SPA 静态资源
    location ^~ /app/assets/ {
        alias /var/www/html/app/assets/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由 fallback
    location ^~ /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # PHP API
    location /api/ {
        alias /var/www/html/api/;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass naming-php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_read_timeout 120s;  # AI 调用可能 60s+
        }
    }

    # PHP fallback (直接 *.php 访问)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass naming-php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }
}
